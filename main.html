<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITZFIZZ - Scroll Animation</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: #0a0a0a;
        }
        
        /* Custom smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* Letter spacing utility */
        .letter-spacing {
            letter-spacing: 0.3em;
        }
        
        /* Road lines animation */
        .road-line {
            position: absolute;
            bottom: 50%;
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 20px,
                rgba(255, 255, 255, 0.3) 20px,
                rgba(255, 255, 255, 0.3) 40px
            );
            animation: roadMove 1s linear infinite;
        }
        
        @keyframes roadMove {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-40px);
            }
        }
        
        /* Glass morphism effect for stat cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(74, 222, 128, 0.3);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #4ade80;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #22c55e;
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white">
    <!-- Main container with increased height for scrolling -->
    <div class="relative h-[300vh]">
        <!-- Sticky hero section -->
        <div class="sticky top-0 h-screen overflow-hidden bg-gradient-to-b from-[#0a0a0a] to-[#1a1a1a]">
            <!-- Background pattern -->
            <div class="absolute inset-0 opacity-10">
                <div class="absolute top-0 left-0 w-full h-full" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 40px 40px;"></div>
            </div>
            
            <!-- Main content container -->
            <div class="relative h-full flex flex-col justify-between px-4 md:px-8 lg:px-16 py-8">
                <!-- Top section with headline -->
                <div class="flex-1 flex items-center justify-center">
                    <div class="max-w-7xl mx-auto text-center">
                        <!-- Headline with letter spacing -->
                        <h1 id="headline" class="text-5xl md:text-7xl lg:text-8xl font-black mb-12 flex flex-wrap justify-center gap-x-4 gap-y-2">
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">W</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">E</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">L</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">C</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">O</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">M</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">E</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10 w-8"></span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">I</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">T</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">Z</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">F</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">I</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">Z</span>
                            <span class="headline-letter inline-block opacity-0 transform translate-y-10">Z</span>
                        </h1>
                        
                        <!-- Statistics cards grid -->
                        <div id="stats-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto mt-12">
                            <!-- Stat Card 1 -->
                            <div class="stat-card glass-card rounded-2xl p-8 opacity-0 transform translate-y-10">
                                <div class="text-5xl md:text-6xl font-bold text-green-400 mb-3">58%</div>
                                <p class="text-gray-300 text-lg">Increase in pick up point use</p>
                            </div>
                            
                            <!-- Stat Card 2 -->
                            <div class="stat-card glass-card rounded-2xl p-8 opacity-0 transform translate-y-10">
                                <div class="text-5xl md:text-6xl font-bold text-blue-400 mb-3">23%</div>
                                <p class="text-gray-300 text-lg">Decrease in customer phone calls</p>
                            </div>
                            
                            <!-- Stat Card 3 -->
                            <div class="stat-card glass-card rounded-2xl p-8 opacity-0 transform translate-y-10">
                                <div class="text-5xl md:text-6xl font-bold text-purple-400 mb-3">27%</div>
                                <p class="text-gray-300 text-lg">Increase in operational efficiency</p>
                            </div>
                            
                            <!-- Stat Card 4 -->
                            <div class="stat-card glass-card rounded-2xl p-8 opacity-0 transform translate-y-10">
                                <div class="text-5xl md:text-6xl font-bold text-orange-400 mb-3">40%</div>
                                <p class="text-gray-300 text-lg">Reduction in response time</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Bottom section with road and car -->
                <div class="relative w-full h-32 md:h-40 mb-8">
                    <!-- Road background -->
                    <div class="absolute bottom-0 left-0 w-full h-20 bg-gradient-to-t from-gray-800 to-gray-700 rounded-t-3xl border-t-4 border-gray-600 shadow-2xl">
                        <!-- Road lines (animated) -->
                        <div class="road-line"></div>
                        
                        <!-- Road markers -->
                        <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-400 via-transparent to-yellow-400 opacity-30"></div>
                    </div>
                    
                    <!-- Car container -->
                    <div id="car-container" class="absolute bottom-4 left-0 w-full">
                        <!-- Car (SVG for better performance and scaling) -->
                        <div id="car" class="absolute bottom-0 left-0 transform -translate-y-1/2" style="width: 120px; height: 60px;">
                            <svg viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-2xl">
                                <!-- Car body -->
                                <rect x="10" y="20" width="100" height="25" rx="8" fill="#4ade80" class="filter drop-shadow-lg"/>
                                <!-- Car top -->
                                <rect x="30" y="10" width="50" height="15" rx="5" fill="#22c55e"/>
                                <!-- Windows -->
                                <rect x="35" y="13" width="20" height="8" rx="2" fill="#a3e635" opacity="0.6"/>
                                <rect x="60" y="13" width="15" height="8" rx="2" fill="#a3e635" opacity="0.6"/>
                                <!-- Wheels -->
                                <circle cx="30" cy="45" r="10" fill="#1f2937" class="filter drop-shadow-md"/>
                                <circle cx="90" cy="45" r="10" fill="#1f2937" class="filter drop-shadow-md"/>
                                <!-- Wheel rims -->
                                <circle cx="30" cy="45" r="5" fill="#4b5563"/>
                                <circle cx="90" cy="45" r="5" fill="#4b5563"/>
                                <!-- Headlights -->
                                <circle cx="15" cy="32" r="4" fill="#fbbf24" opacity="0.8"/>
                                <circle cx="105" cy="32" r="4" fill="#ef4444" opacity="0.8"/>
                            </svg>
                        </div>
                    </div>
                    
                    <!-- Progress indicator (green trail) -->
                    <div id="trail" class="absolute bottom-4 left-0 h-1 bg-green-400 rounded-full shadow-lg shadow-green-400/50" style="width: 0;"></div>
                </div>
            </div>
            
            <!-- Scroll indicator -->
            <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex flex-col items-center opacity-50 hover:opacity-100 transition-opacity">
                <span class="text-xs uppercase tracking-wider text-gray-400 mb-2">Scroll</span>
                <div class="w-5 h-10 border-2 border-gray-400 rounded-full flex justify-center">
                    <div class="w-1 h-2 bg-green-400 rounded-full mt-2 animate-bounce"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Wait for DOM to load
        document.addEventListener('DOMContentLoaded', function() {
            // Register ScrollTrigger
            gsap.registerPlugin(ScrollTrigger);

            // Get elements
            const car = document.getElementById('car');
            const trail = document.getElementById('trail');
            const headlineLetters = document.querySelectorAll('.headline-letter');
            const statCards = document.querySelectorAll('.stat-card');
            
            // Calculate road width and car movement
            const roadWidth = window.innerWidth;
            const carWidth = 120; // Width of car SVG
            const maxCarX = roadWidth - carWidth - 32; // 32px for padding

            // --- INITIAL LOAD ANIMATIONS (Premium feel) ---
            
            // Create a timeline for smooth sequential animations
            const loadTimeline = gsap.timeline({
                defaults: {
                    ease: 'power3.out',
                    duration: 0.8
                }
            });

            // Animate headline letters (staggered fade + slide)
            loadTimeline.to(headlineLetters, {
                opacity: 1,
                y: 0,
                stagger: 0.03,
                duration: 0.6,
                ease: 'back.out(1.2)'
            });

            // Animate stat cards one by one with delay
            loadTimeline.to(statCards, {
                opacity: 1,
                y: 0,
                stagger: 0.15,
                duration: 0.6,
                ease: 'power2.out'
            }, '+=0.2'); // Small delay after headline

            // --- SCROLL-BASED ANIMATIONS ---
            
            // Car movement animation (scrub-based)
            gsap.to(car, {
                x: maxCarX,
                ease: 'none', // Linear movement for natural scroll feel
                scrollTrigger: {
                    trigger: 'body',
                    start: 'top top',
                    end: 'bottom bottom',
                    scrub: 1.5, // Smooth scrubbing with 1.5s lag
                    onUpdate: (self) => {
                        // Update trail width based on car position
                        const carX = gsap.getProperty(car, 'x');
                        trail.style.width = carX + carWidth/2 + 'px';
                    }
                }
            });

            // Additional subtle animations for stat cards on scroll
            statCards.forEach((card, index) => {
                gsap.to(card, {
                    scale: 1.05,
                    borderColor: '#4ade80',
                    scrollTrigger: {
                        trigger: 'body',
                        start: 'top+=30% top',
                        end: 'bottom bottom',
                        scrub: 1,
                    }
                });
            });

            // --- RESPONSIVENESS ---
            
            // Update ScrollTrigger on window resize
            window.addEventListener('resize', () => {
                ScrollTrigger.refresh();
                
                // Recalculate max car position
                const newRoadWidth = window.innerWidth;
                const newMaxCarX = newRoadWidth - carWidth - 32;
                
                // Update car animation
                gsap.to(car, {
                    x: newMaxCarX,
                    overwrite: true
                });
            });

            // --- PERFORMANCE OPTIMIZATIONS ---
            
            // Use will-change for hardware acceleration
            car.style.willChange = 'transform';
            trail.style.willChange = 'width';
            
            // Clean up on page unload
            window.addEventListener('beforeunload', () => {
                ScrollTrigger.getAll().forEach(trigger => trigger.kill());
            });
        });
    </script>

    <!-- Bootstrap Icons (optional, for extra flair) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Optional: Add some floating particles for visual interest -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-2 h-2 bg-green-400/20 rounded-full animate-ping"></div>
        <div class="absolute top-3/4 right-1/4 w-3 h-3 bg-blue-400/20 rounded-full animate-ping animation-delay-1000"></div>
        <div class="absolute bottom-1/4 right-1/3 w-1 h-1 bg-purple-400/20 rounded-full animate-ping animation-delay-2000"></div>
    </div>

    <style>
        /* Additional custom animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        .animation-delay-1000 {
            animation-delay: 1s;
        }
        
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        
        /* Smooth transitions for all interactive elements */
        * {
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
    </style>
</body>
</html>
